name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  # 第一步：提前创建 Release 草稿，后续各平台构建完成后上传产物到这里
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "json2excel-gui ${{ github.ref_name }}"
          draft: true
          prerelease: false
          body: |
            ### 📥 下载指南

            请根据您的操作系统和芯片架构选择对应的安装包：

            | 操作系统 | 架构 | 推荐下载文件 | 说明 |
            | :--- | :--- | :--- | :--- |
            | **macOS** | M1/M2/M3... (aarch64) | `*-macOS-aarch64.dmg` | 苹果 M 系列芯片 |
            | **macOS** | Intel (x86_64) | `*-macOS-x86_64.dmg` | 旧款 Intel 芯片 Mac |
            | **Windows** | x86_64 | `*-Windows-x86_64-setup.exe` | 主流 Windows 10/11，推荐 |
            | **Windows** | ARM64 | `*-Windows-aarch64-setup.exe` | Windows ARM 设备（Surface Pro X 等） |
            | **Linux** | x86_64 | `*-Linux-x86_64.deb` / `.AppImage` | 主流 PC |
            | **Linux** | aarch64 | `*-Linux-aarch64.deb` / `.AppImage` | ARM 设备（树莓派等） |

            > 不确定架构？macOS 点击左上角「苹果菜单 → 关于本机」查看；Windows 在「设置 → 系统 → 关于」查看。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 第二步：各平台并行构建并上传重命名后的产物
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS-aarch64
            bundle_dir: src-tauri/target/aarch64-apple-darwin/release/bundle
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS-x86_64
            bundle_dir: src-tauri/target/x86_64-apple-darwin/release/bundle

          # Linux x86_64 (原生)
          - platform: ubuntu-22.04
            args: ''
            name: Linux-x86_64
            bundle_dir: src-tauri/target/release/bundle

          # Linux aarch64 (原生 ARM runner)
          - platform: ubuntu-22.04-arm
            args: ''
            name: Linux-aarch64
            bundle_dir: src-tauri/target/release/bundle

          # Windows x86_64 (原生)
          - platform: windows-latest
            args: ''
            name: Windows-x86_64
            bundle_dir: src-tauri/target/release/bundle

          # Windows aarch64 (从 x64 交叉编译)
          - platform: windows-latest
            args: '--target aarch64-pc-windows-msvc'
            name: Windows-aarch64
            bundle_dir: src-tauri/target/aarch64-pc-windows-msvc/release/bundle

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ 
            (matrix.name == 'macOS-aarch64' || matrix.name == 'macOS-x86_64') && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
            matrix.name == 'Windows-aarch64' && 'aarch64-pc-windows-msvc' ||
            '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      # 只构建，不创建 Release（不传 tagName）
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      # ── macOS 上传 ──
      - name: Upload (macOS)
        if: startsWith(matrix.name, 'macOS')
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          BUNDLE="${{ matrix.bundle_dir }}"
          DMG=$(ls $BUNDLE/dmg/*.dmg | head -1)
          gh release upload "${{ github.ref_name }}" \
            "$DMG#json2excel-gui-${VERSION}-${{ matrix.name }}.dmg" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Linux 上传 ──
      - name: Upload (Linux)
        if: startsWith(matrix.name, 'Linux')
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          BUNDLE="${{ matrix.bundle_dir }}"
          DEB=$(ls $BUNDLE/deb/*.deb | head -1)
          APPIMAGE=$(ls $BUNDLE/appimage/*.AppImage | head -1)
          gh release upload "${{ github.ref_name }}" \
            "$DEB#json2excel-gui-${VERSION}-${{ matrix.name }}.deb" \
            "$APPIMAGE#json2excel-gui-${VERSION}-${{ matrix.name }}.AppImage" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Windows 上传 ──
      - name: Upload (Windows)
        if: startsWith(matrix.name, 'Windows')
        shell: pwsh
        run: |
          $VERSION = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $BUNDLE = "${{ matrix.bundle_dir }}"
          $ARTIFACTS = @()
          $EXE = Get-ChildItem "$BUNDLE/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($EXE) { $ARTIFACTS += "$($EXE.FullName)#json2excel-gui-${VERSION}-${{ matrix.name }}-setup.exe" }
          $MSI = Get-ChildItem "$BUNDLE/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($MSI) { $ARTIFACTS += "$($MSI.FullName)#json2excel-gui-${VERSION}-${{ matrix.name }}.msi" }
          if ($ARTIFACTS.Count -gt 0) {
            gh release upload "${{ github.ref_name }}" $ARTIFACTS --clobber
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
