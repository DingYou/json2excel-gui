name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS-aarch64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS-x86_64'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux-x86_64'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows-x86_64'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})
    
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'json2excel-gui v__VERSION__'
          releaseBody: |
            ### 📥 下载指南
            请根据您的电脑系统选择对应的安装文件：

            | 操作系统 | 文件后缀 | 架构说明 |
            | :--- | :--- | :--- |
            | **macOS (M1/M2/M3)** | `.dmg (aarch64)` | 苹果M系列芯片专用 |
            | **macOS (Intel)** | `.dmg (x64)` | 旧款苹果电脑专用 |
            | **Windows** | `.msi` 或 `.exe` | Windows 10/11 选其一即可 |
            | **Linux (Ubuntu/Debian)** | `.deb` | 双击安装 |
            | **Linux (通用)** | `.AppImage` | 免安装，直接运行 |

            > [!TIP]
            > 如果您不确定自己的系统架构，macOS 用户建议优先查看“关于本机”。Windows 用户下载 `.msi` 通常是最佳实践。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
